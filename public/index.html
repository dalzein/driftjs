<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=0"
    />
    <meta name="description" content="2D drifting game" />
    <title>drift.js</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- The viewport wraps both canvases so screen-shake can transform them together -->
    <div class="viewport">
      <canvas class="trails"></canvas>
      <canvas class="game"></canvas>
    </div>

    <div class="overlay">
      <header>
        <h1>drift.js</h1>
        <p class="instructions">Use the arrow keys to drive</p>
      </header>

      <div class="hud">
        <div class="hud-speed">
          <span class="speed-value">0</span>
          <span class="speed-unit">km/h</span>
        </div>
        <div class="hud-score">
          <span class="score-label">SCORE</span>
          <span class="score-value">0</span>
        </div>
        <div class="hud-best">
          <span class="score-label">BEST</span>
          <span class="best-value">0</span>
        </div>
        <div class="boost" title="Boost (Shift) — charge it by drifting">
          <div class="boost-fill"></div>
          <span class="boost-label">BOOST</span>
        </div>
      </div>

      <div class="drift-meter">
        <span class="drift-points">0</span>
        <span class="drift-multiplier">x1</span>
      </div>

      <div class="top-buttons">
        <a
          class="icon-button github-link"
          href="https://github.com/dalzein/driftjs"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="View source on GitHub"
          title="View source on GitHub"
        >
          <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true">
            <path
              fill="currentColor"
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"
            />
          </svg>
        </a>
        <button class="icon-button mute-toggle" title="Toggle sound (M)">
          <span class="mute-on">🔊</span>
          <span class="mute-off">🔇</span>
        </button>
        <button class="clear-tire-marks">Clear tire marks</button>
      </div>

      <div class="mobile-controls">
        <div class="controls-left">
          <button class="control-button arrow-left">
            <img src="./arrow-left.png" alt="Left" draggable="false" />
          </button>
          <button class="control-button arrow-right">
            <img src="./arrow-right.png" alt="Right" draggable="false" />
          </button>
        </div>
        <div class="controls-mid">
          <button class="control-button boost-btn" title="Boost">
            <span>BOOST</span>
          </button>
        </div>
        <div class="controls-right">
          <button class="control-button arrow-down">
            <img src="./arrow-down.png" alt="Brake" draggable="false" />
          </button>
          <button class="control-button arrow-up">
            <img src="./arrow-up.png" alt="Gas" draggable="false" />
          </button>
        </div>
      </div>
    </div>

    <img id="car-asset" src="car.png" alt="" draggable="false" hidden />
    <script src="drift.js"></script>
  </body>
</html>
