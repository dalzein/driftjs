<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./black.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=0"
    />
    <meta name="description" content="2D drifting game" />
    <title>drift.js</title>
    <link rel="manifest" href="site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- The viewport wraps both canvases so screen-shake can transform them together -->
    <div class="viewport">
      <canvas class="trails"></canvas>
      <canvas class="game"></canvas>
    </div>

    <div class="overlay">
      <header>
        <h1>drift.js</h1>
        <p class="instructions">Use the arrow keys to drive</p>
      </header>

      <div class="hud">
        <div class="hud-speed">
          <span class="speed-value">0</span>
          <span class="speed-unit">km/h</span>
        </div>
        <div class="hud-score">
          <span class="score-label">SCORE</span>
          <span class="score-value">0</span>
        </div>
        <div class="hud-best">
          <span class="score-label">BEST</span>
          <span class="best-value">0</span>
        </div>
        <div class="boost" title="Boost (Shift) — charge it by drifting">
          <div class="boost-fill"></div>
          <span class="boost-label">BOOST</span>
        </div>
      </div>

      <div class="drift-meter">
        <span class="drift-points">0</span>
        <span class="drift-multiplier">x1</span>
      </div>

      <div class="top-buttons">
        <button class="icon-button mute-toggle" title="Toggle sound (M)">
          <span class="mute-on">🔊</span>
          <span class="mute-off">🔇</span>
        </button>
        <button class="clear-tire-marks">Clear tire marks</button>
      </div>

      <div class="mobile-controls">
        <div class="controls-left">
          <button class="control-button arrow-left">
            <img src="./arrow-left.png" alt="Left" draggable="false" />
          </button>
          <button class="control-button arrow-right">
            <img src="./arrow-right.png" alt="Right" draggable="false" />
          </button>
        </div>
        <div class="controls-mid">
          <button class="control-button boost-btn" title="Boost">
            <span>BOOST</span>
          </button>
        </div>
        <div class="controls-right">
          <button class="control-button arrow-down">
            <img src="./arrow-down.png" alt="Brake" draggable="false" />
          </button>
          <button class="control-button arrow-up">
            <img src="./arrow-up.png" alt="Gas" draggable="false" />
          </button>
        </div>
      </div>
    </div>

    <img id="car-asset" src="car.png" alt="" draggable="false" hidden />
    <script src="drift.js"></script>
  </body>
</html>
